<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim test</title>
<link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Mono', monospace;
  background: #f0ede6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.25rem;
}

.wrap {
  width: 100%;
  max-width: 480px;
  border: 3px solid #000;
}

.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
  border-bottom: 1.5px solid #000;
}

.game-title {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #9C9C9C;
}

#results {
  font-size: 11px;
  color: #9C9C9C;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

#results strong { color: #000; font-weight: 500; }

#game-area {
  position: relative;
  width: 100%;
  height: 60vw;
  max-height: 340px;
  background: #f0ede6;
  overflow: hidden;
  border-bottom: 1.5px solid #000;
  cursor: crosshair;
}

.target {
  position: absolute;
  background: #000;
  border-radius: 50%;
  cursor: crosshair;
  transition: transform 0.08s;
  -webkit-tap-highlight-color: transparent;
}

@media (hover: hover) {
  .target:hover { transform: scale(1.08); }
}

.game-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
}

.actions {
  display: flex;
  align-items: center;
  gap: 1rem;
}

button {
  background: #f0ede6;
  color: #000;
  border: 1.5px solid #000;
  padding: 0.45rem 1rem;
  font-size: 10px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: background 0.12s, color 0.12s;
  -webkit-tap-highlight-color: transparent;
}

@media (hover: hover) {
  button:hover { background: #000; color: #f0ede6; }
}
button:active { background: #000; color: #f0ede6; }

#home {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #9C9C9C;
  text-decoration: none;
  transition: color 0.12s;
}
#home:hover { color: #000; }
</style>
</head>
<body>

<div class="wrap">
  <div class="game-header">
    <span class="game-title">Aim test</span>
    <span id="results">Press start — 10 targets</span>
  </div>
  <div id="game-area"></div>
  <div class="game-footer">
    <a id="home" href="index.html">← back</a>
    <div class="actions">
      <button id="start-btn">Start</button>
    </div>
  </div>
</div>

<script>
const gameArea = document.getElementById("game-area");
const results = document.getElementById("results");
const startBtn = document.getElementById("start-btn");
const TOTAL = 10, SIZE = 52, MIN_DIST = 100;
let times = [], startTime, hit = 0, lastX = -1, lastY = -1;

function spawnTarget() {
  gameArea.innerHTML = "";
  if (hit >= TOTAL) return endRound();
  const areaW = gameArea.clientWidth || 480;
  const areaH = gameArea.clientHeight || 300;
  let left, top, tries = 0;
  do {
    left = Math.random() * (areaW - SIZE);
    top = Math.random() * (areaH - SIZE);
    const dx = (left + SIZE / 2) - lastX;
    const dy = (top + SIZE / 2) - lastY;
    tries++;
  } while (Math.sqrt(dx*dx + dy*dy) < MIN_DIST && tries < 50);
  lastX = left + SIZE / 2;
  lastY = top + SIZE / 2;
  const t = document.createElement("div");
  t.className = "target";
  t.style.width = SIZE + "px";
  t.style.height = SIZE + "px";
  t.style.left = left + "px";
  t.style.top = top + "px";
  gameArea.appendChild(t);
  requestAnimationFrame(() => { startTime = performance.now(); });
  t.onclick = () => {
    const ms = Math.round(performance.now() - startTime);
    times.push(ms);
    hit++;
    results.textContent = `Target ${hit}/${TOTAL} — ${ms} ms`;
    spawnTarget();
  };
}

function endRound() {
  const avg = Math.round(times.reduce((a, b) => a + b, 0) / times.length);
  results.textContent = `Done — avg ${avg} ms`;
  times = []; hit = 0; lastX = -1; lastY = -1;
  startBtn.style.display = "inline-block";
}

startBtn.onclick = () => {
  results.textContent = "Click the targets!";
  startBtn.style.display = "none";
  hit = 0; times = []; lastX = -1; lastY = -1;
  spawnTarget();
};
</script>
</body>
</html>
