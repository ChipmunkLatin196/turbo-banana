<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aim test</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafafa;
      color: #111;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 20px;
    }

    #game-area {
      position: relative;
      width: 90vw;
      max-width: 600px;
      height: 60vh;
      background: #fafafa;
      border: 1px solid #ebebeb;
      border-radius: 8px;
      overflow: hidden;
    }

    .target {
      position: absolute;
      width: 60px;
      height: 60px;
      background: #111;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .target:hover { transform: scale(1.08); }

    #results {
      font-size: 14px;
      color: #bbb;
    }

    button {
      background: #fafafa;
      color: #111;
      border: 1px solid #ebebeb;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 6px;
      transition: border-color 0.2s;
    }

    button:hover { border-color: #bbb; }

    #home {
      font-size: 13px;
      color: #bbb;
      text-decoration: none;
      transition: color 0.2s;
    }

    #home:hover { color: #111; }
  </style>
</head>
<body>
  <div id="game-area"></div>
  <div id="results">Press "Start" to begin (10 targets)</div>
  <button id="start-btn">Start</button>
  <a id="home" href="index.html">← back</a>

  <script>
    const gameArea = document.getElementById("game-area");
    const results  = document.getElementById("results");
    const startBtn = document.getElementById("start-btn");

    const TOTAL = 10, SIZE = 60;
    let times = [], startTime, hit = 0;

    function spawnTarget() {
      if (hit >= TOTAL) return endRound();
      const t = document.createElement("div");
      t.className = "target";
      t.style.left = Math.random() * (gameArea.clientWidth  - SIZE) + "px";
      t.style.top  = Math.random() * (gameArea.clientHeight - SIZE) + "px";
      gameArea.innerHTML = "";
      gameArea.appendChild(t);
      startTime = Date.now();
      t.onclick = () => {
        times.push(Date.now() - startTime);
        results.textContent = `Target ${++hit}/${TOTAL} — ${times[times.length-1]} ms`;
        spawnTarget();
      };
    }

    function endRound() {
      gameArea.innerHTML = "";
      const avg = Math.round(times.reduce((a, b) => a + b, 0) / times.length);
      results.textContent = `Done — avg ${avg} ms`;
      times = []; hit = 0;
      startBtn.style.display = "inline-block";
    }

    startBtn.onclick = () => {
      results.textContent = "Click the targets!";
      startBtn.style.display = "none";
      spawnTarget();
    };
  </script>
</body>
</html>
