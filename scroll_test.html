<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scroll test</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafafa;
      color: #111;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 20px;
    }

    #game-area {
      width: 90vw;
      max-width: 600px;
      height: 60vh;
      background: #fafafa;
      border: 1px solid #ebebeb;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }

    #counter {
      font-size: 48px;
      font-weight: 300;
      color: #ebebeb;
      pointer-events: none;
      transition: color 0.1s;
    }

    #game-area.running #counter { color: #111; }

    #results { font-size: 14px; color: #bbb; }

    button {
      background: #fafafa;
      color: #111;
      border: 1px solid #ebebeb;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 6px;
      transition: border-color 0.2s;
    }

    button:hover { border-color: #bbb; }

    #home {
      font-size: 13px;
      color: #bbb;
      text-decoration: none;
      transition: color 0.2s;
    }

    #home:hover { color: #111; }
  </style>
</head>
<body>
  <div id="game-area">
    <span id="counter">0</span>
  </div>
  <div id="results">10 seconds, scroll as fast as you can</div>
  <button id="start-btn">Start</button>
  <a id="home" href="index.html">← back</a>

  <script>
    const area     = document.getElementById("game-area");
    const counter  = document.getElementById("counter");
    const results  = document.getElementById("results");
    const startBtn = document.getElementById("start-btn");

    let scrolls = 0, timeLeft = 10, timer, running = false;

    function startTest() {
      scrolls = 0; timeLeft = 10; running = true;
      counter.textContent = "0";
      results.textContent = `${timeLeft}s`;
      startBtn.style.display = "none";
      area.classList.add("running");
      timer = setInterval(() => {
        timeLeft--;
        results.textContent = `${timeLeft}s`;
        if (timeLeft <= 0) endTest();
      }, 1000);
    }

    function endTest() {
      clearInterval(timer);
      running = false;
      area.classList.remove("running");
      const sps = (scrolls / 10).toFixed(1);
      results.textContent = `${scrolls} scrolls — ${sps} per second`;
      startBtn.style.display = "inline-block";
    }

    area.addEventListener("wheel", e => {
      e.preventDefault();
      if (!running) return;
      counter.textContent = ++scrolls;
    }, { passive: false });

    startBtn.addEventListener("click", startTest);
  </script>
</body>
</html>
