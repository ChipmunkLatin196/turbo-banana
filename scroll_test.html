<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scroll test</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafafa;
      color: #111;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 20px;
    }

    #game-area {
      width: 90vw;
      max-width: 600px;
      height: 60vh;
      background: #fafafa;
      border: 1px solid #ebebeb;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }

    #counter {
      font-size: 48px;
      font-weight: 300;
      color: #ebebeb;
      pointer-events: none;
      transition: color 0.1s;
    }

    #game-area.running #counter { color: #111; }
    #results { font-size: 14px; color: #bbb; }

    button {
      background: #fafafa;
      color: #111;
      border: 1px solid #ebebeb;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 6px;
      transition: border-color 0.2s;
    }

    button:hover { border-color: #bbb; }

    #home {
      font-size: 13px;
      color: #bbb;
      text-decoration: none;
      transition: color 0.2s;
    }

    #home:hover { color: #111; }
  </style>
</head>
<body>
  <div id="game-area">
    <span id="counter">0</span>
  </div>
  <div id="results">10 seconds, scroll as fast as you can</div>
  <button id="start-btn">Start</button>
  <a id="home" href="index.html">← back</a>

  <script>
    const area     = document.getElementById("game-area");
    const counter  = document.getElementById("counter");
    const results  = document.getElementById("results");
    const startBtn = document.getElementById("start-btn");

    const DURATION = 10000; // ms
    const MIN_DELTA = 30;   // minimum wheel delta to count as one scroll
    let scrolls = 0, running = false, timer, startTime;
    let lastScrollTime = 0;

    function startTest() {
      if (running) return;
      scrolls = 0; running = true;
      counter.textContent = "0";
      startBtn.style.display = "none";
      area.classList.add("running");
      startTime = performance.now();

      timer = setInterval(() => {
        const elapsed = performance.now() - startTime;
        const left = Math.ceil((DURATION - elapsed) / 1000);
        results.textContent = `${Math.max(0, left)}s`;
        if (elapsed >= DURATION) endTest();
      }, 100);
    }

    function endTest() {
      clearInterval(timer);
      running = false;
      area.classList.remove("running");
      const elapsed = (performance.now() - startTime) / 1000;
      const sps = (scrolls / elapsed).toFixed(1);
      results.textContent = `${scrolls} scrolls — ${sps} per second`;
      startBtn.style.display = "inline-block";
    }

    // Wheel: require minimum delta to filter trackpad micro-events
    area.addEventListener("wheel", e => {
      e.preventDefault();
      if (!running) return;
      if (Math.abs(e.deltaY) < MIN_DELTA) return;
      counter.textContent = ++scrolls;
    }, { passive: false });

    // Touch swipe support
    let touchStartY = 0;
    area.addEventListener("touchstart", e => {
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });
    area.addEventListener("touchmove", e => {
      if (!running) return;
      const dy = touchStartY - e.touches[0].clientY;
      if (Math.abs(dy) > 20) {
        counter.textContent = ++scrolls;
        touchStartY = e.touches[0].clientY;
      }
      e.preventDefault();
    }, { passive: false });

    startBtn.addEventListener("click", startTest);
  </script>
</body>
</html>
