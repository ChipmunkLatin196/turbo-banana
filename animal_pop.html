<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animal pop</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafafa;
      color: #111;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 20px;
    }

    #game-area {
      position: relative;
      width: 90vw;
      max-width: 600px;
      height: 60vh;
      background: #fafafa;
      border: 1px solid #ebebeb;
      border-radius: 8px;
      overflow: hidden;
    }

    .creature {
      position: absolute;
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 4px 6px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 13px;
      white-space: pre;
      line-height: 1;
      user-select: none;
      transition: transform 0.15s, opacity 0.15s;
    }

    .creature:hover { border-color: #bbb; }

    .creature.pop {
      transform: scale(0.6);
      opacity: 0;
    }

    #results { font-size: 14px; color: #bbb; }

    .btns { display: flex; gap: 10px; }

    button {
      background: #fafafa;
      color: #111;
      border: 1px solid #ebebeb;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 6px;
      transition: border-color 0.2s;
    }

    button:hover { border-color: #bbb; }

    #home {
      font-size: 13px;
      color: #bbb;
      text-decoration: none;
      transition: color 0.2s;
    }

    #home:hover { color: #111; }
  </style>
</head>
<body>
  <div id="game-area"></div>
  <div id="results">Pop the creatures</div>
  <div class="btns">
    <button id="start-btn">Start</button>
    <button id="stop-btn" style="display:none;">Stop</button>
  </div>
  <a id="home" href="index.html">← back</a>

  <script>
    const area     = document.getElementById("game-area");
    const results  = document.getElementById("results");
    const startBtn = document.getElementById("start-btn");
    const stopBtn  = document.getElementById("stop-btn");

    const creatures = [
      { art: `+-----------+\n|   /\\_/\\   |\n|  ( o.o )  |\n|   > ^ <   |\n+-----------+`, sound: "pop1.mp3" },
      { art: `+-----------+\n|   ^__^    |\n|  (oo)     |\n|  (__)     |\n+-----------+`, sound: "pop2.mp3" },
      { art: `+-----------+\n|   /\\_/\\   |\n|  ( -.- )  |\n|   zzz     |\n+-----------+`, sound: "pop3.mp3" },
      { art: `+-----------+\n|   ()_()   |\n|   (o.o)   |\n|   > ^ <   |\n+-----------+`, sound: "pop4.mp3" },
      { art: `+-----------+\n|    //     |\n|   (oo)    |\n|   /-/     |\n+-----------+`, sound: "pop5.mp3" },
      { art: `+-----------+\n|   ^__^    |\n|  ('o')    |\n|  (   )    |\n+-----------+`, sound: "pop6.mp3" },
      { art: `+-----------+\n|    ,~.    |\n|   (o,o)   |\n|   <) )╯   |\n+-----------+`, sound: "pop7.mp3" },
      { art: `+-----------+\n|    >>\\\\   |\n|   (o o)   |\n|   /   \\   |\n+-----------+`, sound: "pop8.mp3" },
    ];

    let pops = 0, spawnTimer, running = false;

    function playSound(file) {
      new Audio(`assets/sfx/pops/${file}`).play().catch(() => {});
    }

    function spawn() {
      const c = creatures[Math.floor(Math.random() * creatures.length)];
      const el = document.createElement("div");
      el.className = "creature";
      el.textContent = c.art;
      area.appendChild(el);

      const w = el.offsetWidth, h = el.offsetHeight;
      let top, left, tries = 0, overlap;

      do {
        top  = Math.random() * (area.clientHeight - h);
        left = Math.random() * (area.clientWidth  - w);
        overlap = false;
        area.querySelectorAll(".creature").forEach(other => {
          if (other === el) return;
          const ox = parseFloat(other.style.left), oy = parseFloat(other.style.top);
          if (!(left + w < ox || left > ox + other.offsetWidth || top + h < oy || top > oy + other.offsetHeight))
            overlap = true;
        });
      } while (overlap && ++tries < 50);

      el.style.top  = top  + "px";
      el.style.left = left + "px";

      el.addEventListener("click", () => {
        if (!running) return;
        results.textContent = `Pops: ${++pops}`;
        playSound(c.sound);
        el.classList.add("pop");
        setTimeout(() => el.remove(), 200);
      });

      setTimeout(() => { if (area.contains(el)) el.remove(); }, 6000);
    }

    function startGame() {
      pops = 0; running = true;
      results.textContent = "Pops: 0";
      startBtn.style.display = "none";
      stopBtn.style.display  = "inline-block";
      spawnTimer = setInterval(() => { for (let i = 0; i < 3; i++) spawn(); }, 700);
    }

    function stopGame() {
      clearInterval(spawnTimer);
      running = false;
      area.innerHTML = "";
      results.textContent = `Done — ${pops} pops`;
      startBtn.style.display = "inline-block";
      stopBtn.style.display  = "none";
    }

    startBtn.addEventListener("click", startGame);
    stopBtn.addEventListener("click", stopGame);
  </script>
</body>
</html>
