<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animal pop</title>
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafafa;
      color: #111;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 20px;
    }

    #game-area {
      position: relative;
      width: 90vw;
      max-width: 600px;
      height: 60vh;
      background: #fafafa;
      border: 1px solid #ebebeb;
      border-radius: 8px;
      overflow: hidden;
    }

    .creature {
      position: absolute;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      animation: wobble 2s ease-in-out infinite;
      opacity: 0;
      transition: opacity 0.3s, transform 0.15s;
    }

    @keyframes wobble {
      0%   { margin-top: 0px;  }
      25%  { margin-top: -4px; }
      50%  { margin-top: 0px;  }
      75%  { margin-top: -4px; }
      100% { margin-top: 0px;  }
    }

    .creature:hover { border-color: #bbb; animation: none; }

    .creature.pop {
      transform: scale(0.4);
      opacity: 0;
      animation: none;
    }

    #results { font-size: 14px; color: #bbb; }

    .btns { display: flex; gap: 10px; }

    button {
      background: #fafafa;
      color: #111;
      border: 1px solid #ebebeb;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 6px;
      transition: border-color 0.2s;
    }

    button:hover { border-color: #bbb; }

    #home {
      font-size: 13px;
      color: #bbb;
      text-decoration: none;
      transition: color 0.2s;
    }

    #home:hover { color: #111; }
  </style>
</head>
<body>
  <div id="game-area"></div>
  <div id="results">Pop the creatures</div>
  <div class="btns">
    <button id="start-btn">Start</button>
    <button id="stop-btn" style="display:none;">Stop</button>
  </div>
  <a id="home" href="index.html">← back</a>

  <script>
    const area     = document.getElementById("game-area");
    const results  = document.getElementById("results");
    const startBtn = document.getElementById("start-btn");
    const stopBtn  = document.getElementById("stop-btn");

    const creatures = [
      { art: "🐱", sound: "pop1.mp3" },
      { art: "🐶", sound: "pop2.mp3" },
      { art: "🐸", sound: "pop3.mp3" },
      { art: "🐭", sound: "pop4.mp3" },
      { art: "🐼", sound: "pop5.mp3" },
      { art: "🦊", sound: "pop6.mp3" },
      { art: "🐨", sound: "pop7.mp3" },
      { art: "🐯", sound: "pop8.mp3" },
    ];

    const SIZES = [
      { size: 64,  fontSize: 34, speed: 1.4 },
      { size: 96,  fontSize: 52, speed: 1.0 },
      { size: 120, fontSize: 68, speed: 0.6 },
    ];

    let activeAnimals = [];
    let animFrameId;

    function animateAnimals() {
      animFrameId = requestAnimationFrame(animateAnimals);
      activeAnimals.forEach(a => {
        if (!a.el || !area.contains(a.el)) return;
        a.x += a.vx;
        a.y += a.vy;
        const maxX = area.clientWidth  - a.w;
        const maxY = area.clientHeight - a.w;
        if (a.x <= 0)    { a.x = 0;    a.vx = Math.abs(a.vx); }
        if (a.x >= maxX) { a.x = maxX; a.vx = -Math.abs(a.vx); }
        if (a.y <= 0)    { a.y = 0;    a.vy = Math.abs(a.vy); }
        if (a.y >= maxY) { a.y = maxY; a.vy = -Math.abs(a.vy); }
        a.el.style.left = a.x + "px";
        a.el.style.top  = a.y + "px";
      });
    }

    function playSound(file) {
      new Audio(`assets/sfx/pops/${file}`).play().catch(() => {});
    }

    function spawn() {
      const c = creatures[Math.floor(Math.random() * creatures.length)];
      const s = SIZES[Math.floor(Math.random() * SIZES.length)];
      const el = document.createElement("div");
      el.className = "creature";
      el.textContent = c.art;
      el.style.width    = s.size + "px";
      el.style.height   = s.size + "px";
      el.style.fontSize = s.fontSize + "px";
      el.style.animationDelay = (Math.random() * 2) + "s";
      area.appendChild(el);

      const areaW = area.clientWidth  || 600;
      const areaH = area.clientHeight || 400;

      let left, top, tries = 0, ok = false;
      while (!ok && tries < 50) {
        left = Math.random() * Math.max(0, areaW - s.size);
        top  = Math.random() * Math.max(0, areaH - s.size);
        ok = !activeAnimals.some(a => {
          const dx = (left + s.size / 2) - (a.x + a.w / 2);
          const dy = (top  + s.size / 2) - (a.y + a.w / 2);
          return Math.sqrt(dx*dx + dy*dy) < (s.size / 2 + a.w / 2 + 8);
        });
        tries++;
      }

      el.style.left = left + "px";
      el.style.top  = top  + "px";

      requestAnimationFrame(() => { el.style.opacity = "1"; });

      const angle = Math.random() * Math.PI * 2;
      const animal = { el, x: left, y: top, w: s.size, vx: Math.cos(angle) * s.speed, vy: Math.sin(angle) * s.speed };
      activeAnimals.push(animal);

      el.addEventListener("click", () => {
        if (!running) return;
        results.textContent = `Pops: ${++pops}`;
        playSound(c.sound);
        el.classList.add("pop");
        activeAnimals = activeAnimals.filter(a => a.el !== el);
        setTimeout(() => { if (area.contains(el)) el.remove(); }, 200);
      });

      setTimeout(() => {
        if (area.contains(el)) {
          el.style.opacity = "0";
          setTimeout(() => {
            el.remove();
            activeAnimals = activeAnimals.filter(a => a.el !== el);
          }, 300);
        }
      }, 6000);
    }

    function startGame() {
      pops = 0; running = true;
      results.textContent = "Pops: 0";
      startBtn.style.display = "none";
      stopBtn.style.display  = "inline-block";
      spawnTimer = setInterval(() => {
        const crowded = activeAnimals.length >= 12;
        if (!crowded) for (let i = 0; i < 3; i++) spawn();
      }, 700);
    }

    function stopGame() {
      clearInterval(spawnTimer);
      running = false;
      area.innerHTML = "";
      results.textContent = `Done — ${pops} pops`;
      startBtn.style.display = "inline-block";
      stopBtn.style.display  = "none";
    }

    startBtn.addEventListener("click", startGame);
    stopBtn.addEventListener("click", stopGame);
  </script>
</body>
</html>
