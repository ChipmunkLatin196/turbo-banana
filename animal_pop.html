<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal pop</title>
<link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Mono', monospace;
  background: #f0ede6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.25rem;
}

.wrap {
  width: 100%;
  max-width: 480px;
  border: 3px solid #000;
}

.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
  border-bottom: 1.5px solid #000;
}

.game-title {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #9C9C9C;
}

#results {
  font-size: 11px;
  color: #9C9C9C;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

#game-area {
  position: relative;
  width: 100%;
  height: 60vw;
  max-height: 340px;
  background: #f0ede6;
  border-bottom: 1.5px solid #000;
  overflow: hidden;
}

.creature {
  position: absolute;
  background: #f0ede6;
  border: 1.5px solid #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  animation: float 2s ease-in-out infinite;
  opacity: 0;
  transition: opacity 0.3s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}

@keyframes float {
  0%, 100% { margin-top: 0px; }
  50% { margin-top: -5px; }
}

.creature:hover { border-color: #000; border-width: 2px; animation: none; }

.creature.pop {
  transform: scale(0.3);
  opacity: 0 !important;
  animation: none;
}

.game-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
}

.actions {
  display: flex;
  align-items: center;
  gap: 1rem;
}

button {
  background: #f0ede6;
  color: #000;
  border: 1.5px solid #000;
  padding: 0.45rem 1rem;
  font-size: 10px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: background 0.12s, color 0.12s;
  -webkit-tap-highlight-color: transparent;
}

@media (hover: hover) {
  button:hover { background: #000; color: #f0ede6; }
}
button:active { background: #000; color: #f0ede6; }

#home {
  position: fixed;
  top: 1rem;
  left: 1.25rem;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #9C9C9C;
  text-decoration: none;
  transition: color 0.12s;
  z-index: 10;
}
#home:hover { color: #000; }
</style>
</head>
<body>

<a id="home" href="index.html">← home</a>
<div class="wrap">
  <div class="game-header">
    <span id="results">Pop the creatures</span>
  </div>
  <div id="game-area"></div>
  <div class="game-footer">
    <div class="actions">
      <button id="stop-btn" style="display:none;">Stop</button>
      <button id="start-btn">Start</button>
    </div>
  </div>
</div>

<script>
const area = document.getElementById("game-area");
const results = document.getElementById("results");
const startBtn = document.getElementById("start-btn");
const stopBtn = document.getElementById("stop-btn");

const creatures = [
  { art: "🐱" }, { art: "🐶" }, { art: "🐸" }, { art: "🐭" },
  { art: "🐼" }, { art: "🦊" }, { art: "🐨" }, { art: "🐯" },
];

const SIZES = [
  { size: 56, fontSize: 30, speed: 1.4 },
  { size: 80, fontSize: 44, speed: 1.0 },
  { size: 104, fontSize: 58, speed: 0.6 },
];

let activeAnimals = [], animFrameId;
let pops = 0, running = false, spawnTimer;

function animateAnimals() {
  animFrameId = requestAnimationFrame(animateAnimals);
  activeAnimals.forEach(a => {
    if (!a.el || !area.contains(a.el)) return;
    a.x += a.vx; a.y += a.vy;
    const maxX = area.clientWidth - a.w;
    const maxY = area.clientHeight - a.w;
    if (a.x <= 0) { a.x = 0; a.vx = Math.abs(a.vx); }
    if (a.x >= maxX) { a.x = maxX; a.vx = -Math.abs(a.vx); }
    if (a.y <= 0) { a.y = 0; a.vy = Math.abs(a.vy); }
    if (a.y >= maxY) { a.y = maxY; a.vy = -Math.abs(a.vy); }
    a.el.style.left = a.x + "px";
    a.el.style.top = a.y + "px";
  });
}

function playSound(file) {
  new Audio(`assets/sfx/pops/${file}`).play().catch(() => {});
}

function spawn() {
  const c = creatures[Math.floor(Math.random() * creatures.length)];
  const s = SIZES[Math.floor(Math.random() * SIZES.length)];
  const el = document.createElement("div");
  el.className = "creature";
  el.textContent = c.art;
  el.style.width = s.size + "px";
  el.style.height = s.size + "px";
  el.style.fontSize = s.fontSize + "px";
  el.style.animationDelay = (Math.random() * 2) + "s";
  area.appendChild(el);

  const areaW = area.clientWidth || 480;
  const areaH = area.clientHeight || 300;
  let left, top, tries = 0, ok = false;
  while (!ok && tries < 50) {
    left = Math.random() * Math.max(0, areaW - s.size);
    top = Math.random() * Math.max(0, areaH - s.size);
    ok = !activeAnimals.some(a => {
      const dx = (left + s.size / 2) - (a.x + a.w / 2);
      const dy = (top + s.size / 2) - (a.y + a.w / 2);
      return Math.sqrt(dx*dx + dy*dy) < (s.size / 2 + a.w / 2 + 8);
    });
    tries++;
  }

  el.style.left = left + "px";
  el.style.top = top + "px";
  requestAnimationFrame(() => { el.style.opacity = "1"; });

  const angle = Math.random() * Math.PI * 2;
  const animal = { el, x: left, y: top, w: s.size, vx: Math.cos(angle) * s.speed, vy: Math.sin(angle) * s.speed };
  activeAnimals.push(animal);

  el.addEventListener("click", () => {
    if (!running) return;
    results.textContent = `Pops: ${++pops}`;
    el.classList.add("pop");
    activeAnimals = activeAnimals.filter(a => a.el !== el);
    setTimeout(() => { if (area.contains(el)) el.remove(); }, 200);
  });

  setTimeout(() => {
    if (area.contains(el)) {
      el.style.opacity = "0";
      setTimeout(() => {
        el.remove();
        activeAnimals = activeAnimals.filter(a => a.el !== el);
      }, 300);
    }
  }, 6000);
}

function startGame() {
  pops = 0; running = true;
  results.textContent = "Pops: 0";
  startBtn.style.display = "none";
  stopBtn.style.display = "inline-block";
  animateAnimals();
  spawnTimer = setInterval(() => {
    if (activeAnimals.length < 12) for (let i = 0; i < 3; i++) spawn();
  }, 700);
}

function stopGame() {
  clearInterval(spawnTimer);
  cancelAnimationFrame(animFrameId);
  running = false;
  area.innerHTML = "";
  activeAnimals = [];
  results.textContent = `Done — ${pops} pops`;
  startBtn.style.display = "inline-block";
  stopBtn.style.display = "none";
}

startBtn.addEventListener("click", startGame);
stopBtn.addEventListener("click", stopGame);
</script>
</body>
</html>
