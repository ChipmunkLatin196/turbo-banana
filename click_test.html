<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click test</title>
<link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Mono', monospace;
  background: #f0ede6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.25rem;
}

.wrap {
  width: 100%;
  max-width: 480px;
  border: 3px solid #000;
}

.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
  border-bottom: 1.5px solid #000;
}

.game-title {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #9C9C9C;
}

#results {
  font-size: 11px;
  color: #9C9C9C;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

#game-area {
  position: relative;
  width: 100%;
  height: 60vw;
  max-height: 340px;
  background: #f0ede6;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  border-bottom: 1.5px solid #000;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.06s;
}

#game-area.running:active { background: #e8e5de; }

#counter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 20vw, 120px);
  color: #e0ddd6;
  pointer-events: none;
  transition: color 0.1s;
  letter-spacing: 0.02em;
}

#game-area.running #counter { color: #000; }

.game-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
}

.actions {
  display: flex;
  align-items: center;
  gap: 1rem;
}

button {
  background: #f0ede6;
  color: #000;
  border: 1.5px solid #000;
  padding: 0.45rem 1rem;
  font-size: 10px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: background 0.12s, color 0.12s;
  -webkit-tap-highlight-color: transparent;
}

@media (hover: hover) {
  button:hover { background: #000; color: #f0ede6; }
}
button:active { background: #000; color: #f0ede6; }

#home {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #9C9C9C;
  text-decoration: none;
  transition: color 0.12s;
}
#home:hover { color: #000; }
</style>
</head>
<body>

<div class="wrap">
  <div class="game-header">
    <span class="game-title">Click test</span>
    <span id="results">10 seconds, click fast</span>
  </div>
  <div id="game-area">
    <span id="counter">0</span>
  </div>
  <div class="game-footer">
    <a id="home" href="index.html">← back</a>
    <div class="actions">
      <button id="start-btn">Start</button>
    </div>
  </div>
</div>

<script>
const area = document.getElementById("game-area");
const counter = document.getElementById("counter");
const results = document.getElementById("results");
const startBtn = document.getElementById("start-btn");
let clicks = 0, timeLeft = 10, timer, running = false;

function startTest() {
  clicks = 0; timeLeft = 10; running = true;
  counter.textContent = "0";
  results.textContent = `${timeLeft}s`;
  startBtn.style.display = "none";
  area.classList.add("running");
  timer = setInterval(() => {
    timeLeft--;
    results.textContent = `${timeLeft}s`;
    if (timeLeft <= 0) endTest();
  }, 1000);
}

function endTest() {
  clearInterval(timer);
  running = false;
  area.classList.remove("running");
  const cps = (clicks / 10).toFixed(1);
  results.textContent = `${clicks} clicks — ${cps}/s`;
  startBtn.style.display = "inline-block";
}

area.addEventListener("click", () => {
  if (!running) return;
  counter.textContent = ++clicks;
});

startBtn.addEventListener("click", startTest);
</script>
</body>
</html>
